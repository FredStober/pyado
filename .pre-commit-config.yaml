repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
  hooks:
  - id: check-added-large-files
  - id: check-yaml
  - id: check-toml
  - id: end-of-file-fixer
  - id: trailing-whitespace

- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: 4380fbb73a154b5f5624794c1c78d9719ccc860f  # frozen: v2.16.0
  hooks:
  - id: pretty-format-yaml
    args:
    - --autofix
  - id: pretty-format-toml
    args:
    - --autofix

- repo: https://github.com/Yelp/detect-secrets
  rev: 68e8b45440415753fff70a312ece8da92ba85b4a  # frozen: v1.5.0
  hooks:
  - id: detect-secrets
    args: [--baseline, .secrets.baseline]

- repo: local
  hooks:
  - id: ruff-format
    name: ruff format
    entry: uv
    language: system
    pass_filenames: false
    always_run: true
    args: [run, ruff, format, --force-exclude]

  - id: ruff-check
    name: ruff check
    entry: uv
    language: system
    pass_filenames: false
    always_run: true
    args: [run, ruff, check, --fix]

  - id: pip-audit
    name: pip-audit
    entry: uv
    language: system
    pass_filenames: false
    always_run: true
    args: [run, pip-audit]

  - id: mypy
    name: mypy
    entry: uv
    language: system
    types: [python]
    require_serial: true
    args: [run, mypy]

  - id: ty
    name: ty
    entry: uv
    language: system
    types: [python]
    require_serial: true
    pass_filenames: false
    args: [run, ty, check, src]

  - id: sphinx
    name: sphinx
    entry: uv
    args: [run, --group=docs, sphinx-build, -W, docs, docs/_build/html]
    language: system
    pass_filenames: false
    always_run: true

  - id: pytest
    name: pytest
    entry: uv
    language: system
    pass_filenames: false
    always_run: true
    args: [run, pytest]
