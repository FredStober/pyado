[build-system]
build-backend = "uv_build"
requires = ["uv_build>=0.9.8,<0.10.0"]

[dependency-groups]
dev = [
  "mypy>=1.15.0",
  "prek>=0.4.3",
  "pytest>=9.0.3",
  "pytest-cov>=7.1.0",
  "sphinx>=8.2.3",
  "ty>=0.0.42",
  "types-requests>=2.32.0"
]

[project]
authors = [
  {name = "Fred Stober", email = "pyado@fredstober.de"}
]
dependencies = [
  "pydantic>=2.11.7",
  "requests>=2.32.2"
]
description = "Add your description here"
name = "pyado"
readme = "README.md"
requires-python = ">=3.11"
version = "0.2.0"

[tool.coverage.paths]
source = ["src", "*/site-packages"]
tests = ["scripts", "*/scripts"]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "if __name__ == .__main__.:",
  "def test\\(\\) -> None:"
]
fail_under = 100
show_missing = true

[tool.coverage.run]
branch = true
source = ["pyado", "scripts"]

[tool.mypy]
plugins = ["pydantic.mypy"]
pretty = true
show_column_numbers = true
show_error_codes = true
show_error_context = true
strict = true
warn_unreachable = true

[tool.pytest.ini_options]
addopts = "--cov=pyado --cov=tests --cov-report=term-missing"

[tool.ruff.lint]
ignore = [
  "ANN401",  # any-type
  "COM812"  # missing-trailing-comma
]
preview = true
select = [
  "ALL"
]

[tool.ruff.lint.per-file-ignores]
"src/pyado/pull_request.py" = [
  "PLR0913"  # create_pr legitimately needs 4 positional + 2 keyword-only params
]
"tests/**" = [
  "PLR2004",  # Magic values in test assertions are self-explanatory
  "PLC2701",  # Private name imports are needed for unit testing internals
  "S101",  # pytest uses assert by convention
  "S105",  # Test tokens are intentionally hardcoded fake values
  "SLF001"  # Private member access is needed for testing implementation details
]

[tool.ruff.lint.pydocstyle]
convention = "google"
